<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynamoDB Debug UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>DynamoDB UI</h1>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h2>Tables</h2>
                    <ul id="table-list" class="table-list">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <div id="welcome-view" class="view active">
                <div class="welcome">
                    <h2>Welcome to DynamoDB Debug UI</h2>
                    <p>Select a table from the sidebar to get started.</p>
                </div>
            </div>

            <div id="table-view" class="view">
                <header class="content-header">
                    <h2 id="table-name"></h2>
                    <div class="header-actions">
                        <button id="btn-refresh" class="btn btn-secondary">Refresh</button>
                        <button id="btn-new-item" class="btn btn-primary">New Item</button>
                    </div>
                </header>

                <div class="tabs">
                    <button class="tab active" data-tab="data">Scan</button>
                    <button class="tab" data-tab="schema">Schema</button>
                    <button class="tab" data-tab="query">Query</button>
                </div>

                <!-- Data Tab -->
                <div id="tab-data" class="tab-content active">
                    <div class="toolbar">
                        <div class="toolbar-group">
                            <button id="btn-run-scan" class="btn btn-primary btn-icon" title="Run scan">
                                <span class="scan-play">&#9654;</span>
                                <span class="scan-spinner" style="display:none"></span>
                            </button>
                        </div>
                        <div class="toolbar-group">
                            <label>Limit:</label>
                            <select id="page-limit">
                                <option value="10">10</option>
                                <option value="25" selected>25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                                <option value="1000">1,000</option>
                                <option value="5000">5,000</option>
                                <option value="10000">10,000</option>
                            </select>
                        </div>
                        <div class="toolbar-group toolbar-group-grow">
                            <label>Attributes:</label>
                            <input type="text" id="scan-projection" placeholder="e.g. pk, sk, status, info.rating" title="Comma-separated attribute names to return (leave empty for all)">
                        </div>
                    </div>
                    <div class="scan-filters">
                        <div class="scan-filters-header" id="scan-filters-toggle">
                            <span class="toggle-arrow">&#9654;</span>
                            <span>Filters</span>
                            <span class="filter-count" id="scan-filter-count"></span>
                        </div>
                        <div class="scan-filters-body" id="scan-filters-body" style="display: none;">
                            <div id="scan-filter-rows">
                                <!-- Filter rows populated by JS -->
                            </div>
                            <div class="scan-filters-actions">
                                <button id="btn-add-filter" class="btn btn-secondary btn-sm">Add filter</button>
                                <button id="btn-apply-filters" class="btn btn-primary btn-sm">Run</button>
                                <button id="btn-reset-filters" class="btn btn-secondary btn-sm">Reset</button>
                            </div>
                        </div>
                    </div>
                    <div id="bulk-actions-bar" class="bulk-actions-bar" style="display: none;">
                        <span id="selection-count">0 selected</span>
                        <button id="btn-export-csv" class="btn btn-primary btn-sm">Export CSV</button>
                        <button id="btn-bulk-delete" class="btn btn-danger btn-sm">Delete Selected</button>
                        <button id="btn-clear-selection" class="btn btn-secondary btn-sm">Clear Selection</button>
                    </div>
                    <div class="data-container">
                        <table class="data-table">
                            <thead id="data-thead">
                                <!-- Populated by JS -->
                            </thead>
                            <tbody id="data-tbody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination">
                        <span id="item-count"></span>
                        <button id="btn-load-more" class="btn btn-secondary" style="display:none">Load More</button>
                    </div>
                </div>

                <!-- Schema Tab -->
                <div id="tab-schema" class="tab-content">
                    <div class="schema-container">
                        <section class="schema-section">
                            <h3>Indexes</h3>
                            <div id="schema-indexes"></div>
                        </section>
                        <section class="schema-section">
                            <h3>Entities</h3>
                            <div id="schema-entities"></div>
                        </section>
                    </div>
                </div>

                <!-- Query Tab -->
                <div id="tab-query" class="tab-content">
                    <div class="query-section">
                        <h3>Query</h3>
                        <div class="query-builder">
                            <div class="form-group">
                                <label for="query-entity">Entity Type:</label>
                                <select id="query-entity">
                                    <option value="__any__">-- Any --</option>
                                    <!-- Populated by JS -->
                                </select>
                            </div>
                            <div id="entity-query-fields">
                                <!-- Populated by JS based on entity selection -->
                            </div>
                        </div>
                    </div>

                    <div class="toolbar">
                        <div class="toolbar-group">
                            <button id="btn-run-query" class="btn btn-primary btn-icon" title="Run query">
                                <span class="query-play">&#9654;</span>
                                <span class="query-spinner" style="display:none"></span>
                            </button>
                        </div>
                        <div class="toolbar-group">
                            <label>Limit:</label>
                            <select id="query-limit">
                                <option value="10">10</option>
                                <option value="25" selected>25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                                <option value="1000">1,000</option>
                                <option value="5000">5,000</option>
                                <option value="10000">10,000</option>
                            </select>
                        </div>
                        <div class="toolbar-group toolbar-group-grow">
                            <label>Attributes:</label>
                            <input type="text" id="query-projection" placeholder="e.g. pk, sk, status, info.rating" title="Comma-separated attribute names to return (leave empty for all)">
                        </div>
                    </div>
                    <div class="scan-filters">
                        <div class="scan-filters-header" id="query-filters-toggle">
                            <span class="toggle-arrow">&#9654;</span>
                            <span>Filters</span>
                            <span class="filter-count" id="query-filter-count"></span>
                        </div>
                        <div class="scan-filters-body" id="query-filters-body" style="display: none;">
                            <div id="query-filter-rows">
                                <!-- Filter rows populated by JS -->
                            </div>
                            <div class="scan-filters-actions">
                                <button id="btn-query-add-filter" class="btn btn-secondary btn-sm">Add filter</button>
                                <button id="btn-query-apply-filters" class="btn btn-primary btn-sm">Run</button>
                                <button id="btn-query-reset-filters" class="btn btn-secondary btn-sm">Reset</button>
                            </div>
                        </div>
                    </div>

                    <div class="query-results">
                        <div id="query-bulk-actions-bar" class="bulk-actions-bar" style="display: none;">
                            <span id="query-selection-count">0 selected</span>
                            <button id="btn-query-export-csv" class="btn btn-primary btn-sm">Export CSV</button>
                            <button id="btn-query-bulk-delete" class="btn btn-danger btn-sm">Delete Selected</button>
                            <button id="btn-query-clear-selection" class="btn btn-secondary btn-sm">Clear Selection</button>
                        </div>
                        <div id="query-results-container">
                            <div class="data-container">
                                <table class="data-table">
                                    <thead id="query-data-thead">
                                    </thead>
                                    <tbody id="query-data-tbody">
                                        <tr><td class="empty-state">Run a query to see results</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="pagination">
                            <span id="query-item-count"></span>
                            <button id="btn-query-load-more" class="btn btn-secondary" style="display:none">Load More</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Item Modal -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Item</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="item-editor" rows="20"></textarea>
            </div>
            <div class="modal-footer">
                <button id="btn-delete-item" class="btn btn-danger">Delete</button>
                <button id="btn-save-item" class="btn btn-primary">Save</button>
                <button class="btn btn-secondary modal-close">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
